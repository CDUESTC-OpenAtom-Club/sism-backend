# Test configuration for sism-shared-kernel
# Uses H2 in-memory database - no business tables affected

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

  event-store:
    persistence: in-memory

logging:
  level:
    com.sism: DEBUG
    org.hibernate.SQL: DEBUG
