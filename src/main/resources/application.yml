# =============================================================================
# SISM Backend - 通用配置
# =============================================================================
# 说明：
# 1. 此文件包含所有环境通用的配置
# 2. 所有环境变量都从 .env 文件读取，不设默认值
# 3. 开发环境使用 .env，生产环境使用 .env.production
# =============================================================================

spring:
  application:
    name: sism-backend

  # -----------------------------------------------------------------------------
  # 数据库配置
  # -----------------------------------------------------------------------------
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE}
      minimum-idle: ${DB_HIKARI_MIN_IDLE}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT}
      validation-timeout: ${DB_HIKARI_VALIDATION_TIMEOUT}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT}
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME}
      connection-test-query: SELECT 1
  
  # -----------------------------------------------------------------------------
  # JPA 配置
  # -----------------------------------------------------------------------------
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none  # Flyway 管理 schema
    show-sql: ${JPA_SHOW_SQL}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL}
        use_sql_comments: ${JPA_USE_SQL_COMMENTS}
        jdbc:
          batch_size: ${JPA_BATCH_SIZE}
        order_inserts: true
        order_updates: true
  
  # -----------------------------------------------------------------------------
  # Flyway 配置
  # -----------------------------------------------------------------------------
  flyway:
    enabled: ${FLYWAY_ENABLED}
    baseline-on-migrate: true
    baseline-version: 1.0
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    placeholder-replacement: false
  
  # -----------------------------------------------------------------------------
  # SQL 初始化
  # -----------------------------------------------------------------------------
  sql:
    init:
      mode: never  # 不自动执行 schema.sql 和 data.sql
  
  # -----------------------------------------------------------------------------
  # Redis 配置
  # -----------------------------------------------------------------------------
  data:
    redis:
      enabled: ${REDIS_ENABLED}
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      timeout: ${REDIS_TIMEOUT}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE}
          max-idle: ${REDIS_POOL_MAX_IDLE}
          min-idle: ${REDIS_POOL_MIN_IDLE}
          max-wait: ${REDIS_POOL_MAX_WAIT}
        shutdown-timeout: ${REDIS_SHUTDOWN_TIMEOUT}
  
  # -----------------------------------------------------------------------------
  # Jackson 配置
  # -----------------------------------------------------------------------------
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# -----------------------------------------------------------------------------
# 服务器配置
# -----------------------------------------------------------------------------
server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH}
  compression:
    enabled: ${SERVER_COMPRESSION_ENABLED}
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
logging:
  level:
    root: ${LOG_LEVEL_ROOT:-WARN}
    com.sism: ${LOG_LEVEL_APP:-INFO}
    org.springframework.web: ${LOG_LEVEL_SPRING:-INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:-INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:-DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_SQL_BINDER:-TRACE}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# -----------------------------------------------------------------------------
# SpringDoc OpenAPI 配置
# -----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: ${SPRINGDOC_API_DOCS_PATH}
    enabled: ${SWAGGER_ENABLED}
  swagger-ui:
    path: ${SPRINGDOC_SWAGGER_UI_PATH}
    enabled: ${SWAGGER_ENABLED}
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: ${SPRINGDOC_DISABLE_SWAGGER_DEFAULT_URL}
  show-actuator: false
  packages-to-scan: com.sism.controller

# -----------------------------------------------------------------------------
# JWT 配置
# -----------------------------------------------------------------------------
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}
  max-sessions-per-user: ${JWT_MAX_SESSIONS}

# -----------------------------------------------------------------------------
# Actuator 配置
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: ${MANAGEMENT_BASE_PATH}
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    redis:
      enabled: ${REDIS_ENABLED}
    mail:
      enabled: false
    rabbit:
      enabled: false
    mongo:
      enabled: false
    elasticsearch:
      enabled: false
    diskspace:
      enabled: true
      threshold: ${MANAGEMENT_HEALTH_DISKSPACE_THRESHOLD}

# -----------------------------------------------------------------------------
# 速率限制配置
# -----------------------------------------------------------------------------
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED}
  storage: ${RATE_LIMIT_STORAGE}
  login:
    limit: ${RATE_LIMIT_LOGIN_LIMIT}
    window-seconds: ${RATE_LIMIT_LOGIN_WINDOW}
  api:
    limit: ${RATE_LIMIT_API_LIMIT}
    window-seconds: ${RATE_LIMIT_API_WINDOW}

# -----------------------------------------------------------------------------
# 幂等性配置
# -----------------------------------------------------------------------------
idempotency:
  enabled: ${IDEMPOTENCY_ENABLED}
  ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS}
  protected-paths: ${IDEMPOTENCY_PROTECTED_PATHS}

# -----------------------------------------------------------------------------
# Redis 功能开关
# -----------------------------------------------------------------------------
redis:
  enabled: ${REDIS_ENABLED}

# -----------------------------------------------------------------------------
# 应用配置
# -----------------------------------------------------------------------------
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
    allowed-methods: ${CORS_ALLOWED_METHODS}
    allowed-headers: ${CORS_ALLOWED_HEADERS}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS}
    max-age: ${CORS_MAX_AGE}
  security:
    headers:
      enabled: ${SECURITY_HEADERS_ENABLED}
      frame-options: ${SECURITY_FRAME_OPTIONS}
      content-type-options: ${SECURITY_CONTENT_TYPE_OPTIONS}
      xss-protection: ${SECURITY_XSS_PROTECTION}
      referrer-policy: ${SECURITY_REFERRER_POLICY}
      permissions-policy: ${SECURITY_PERMISSIONS_POLICY}
