# Development Environment Configuration
# 开发环境配置文件

spring:
  # Development Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://175.24.139.148:8386/strategic?stringtype=unspecified}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:64378561huaW}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  
  # JPA Configuration for Development
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  
  # Redis Configuration for Development
  # 开发环境可以启用Redis进行测试
  data:
    redis:
      enabled: ${REDIS_ENABLED:false}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1

# Redis Feature Toggle for Development
redis:
  enabled: ${REDIS_ENABLED:false}  # 开发环境默认禁用，可通过环境变量启用

# Logging Configuration for Development
logging:
  level:
    root: INFO
    com.sism: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.data.redis: DEBUG

# Development CORS Configuration (允许本地前端开发服务器)
app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:3500
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Requested-With,X-Timestamp,X-Signature,X-Idempotency-Key
    allow-credentials: true
    max-age: 3600

# SpringDoc Configuration for Development (启用Swagger UI)
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Actuator Configuration for Development
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: ${REDIS_ENABLED:false}
