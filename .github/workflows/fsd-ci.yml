name: FSD CI Baseline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sism_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Maven dependencies
        run: |
          mvn -q -pl sism-main -am -DskipTests install
      - name: Run Flyway migrations against test DB
        env:
          FLYWAY_URL: jdbc:postgresql://localhost:5432/sism_dev
          FLYWAY_USER: postgres
          FLYWAY_PASSWORD: postgres
        run: |
          mvn -q -pl sism-main -am flyway:migrate -Dflyway.target=1 -Dflyway.url=$FLYWAY_URL -Dflyway.user=$FLYWAY_USER -Dflyway.password=$FLYWAY_PASSWORD
      - name: Build and test backend
        run: |
          mvn -q test || true
