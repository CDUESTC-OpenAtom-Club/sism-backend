# 后端自动部署到生产服务器
# 仓库: CDUESTC-OpenAtom-Club/sism-backend

name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAR_NAME: sism-backend-1.0.0.jar

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B -DskipTests -Dmaven.test.skip=true -Dmaven.javadoc.skip=true

      - name: Get JAR checksum
        id: checksum
        run: |
          LOCAL_MD5=$(md5sum target/${{ env.JAR_NAME }} | cut -d' ' -f1)
          LOCAL_SIZE=$(stat -c%s target/${{ env.JAR_NAME }})
          echo "local_md5=$LOCAL_MD5" >> $GITHUB_OUTPUT
          echo "local_size=$LOCAL_SIZE" >> $GITHUB_OUTPUT
          echo "📦 Local JAR: $LOCAL_SIZE bytes, MD5: $LOCAL_MD5"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Configure server sudoers (one-time setup)
        run: |
          # Skip - already configured on server
          echo "✅ Server sudoers already configured"

      - name: Stop backend service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl stop sism-backend || true"

      - name: Upload JAR to temp directory
        run: |
          # Upload to /tmp first to avoid permission issues
          scp -i ~/.ssh/deploy_key target/${{ env.JAR_NAME }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/${{ env.JAR_NAME }}
      
      - name: Move JAR to deployment directory
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "[ -f /opt/sism/backend/${{ env.JAR_NAME }} ] && mv /opt/sism/backend/${{ env.JAR_NAME }} /opt/sism/backend/${{ env.JAR_NAME }}.old || true; \
             mv /tmp/${{ env.JAR_NAME }} /opt/sism/backend/${{ env.JAR_NAME }}; \
             chown root:sism /opt/sism/backend/${{ env.JAR_NAME }}; \
             chmod 775 /opt/sism/backend/${{ env.JAR_NAME }}"

      - name: Verify checksum
        run: |
          REMOTE_MD5=$(ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "md5sum /opt/sism/backend/${{ env.JAR_NAME }} | cut -d' ' -f1")
          echo "📦 Remote MD5: $REMOTE_MD5"
          echo "📦 Expected MD5: ${{ steps.checksum.outputs.local_md5 }}"
          if [ "$REMOTE_MD5" != "${{ steps.checksum.outputs.local_md5 }}" ]; then
            echo "❌ Checksum mismatch!"
            exit 1
          fi
          echo "✅ Checksum verified"

      - name: Update symlink and restart service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ln -sf /opt/sism/backend/${{ env.JAR_NAME }} /opt/sism/backend/sism-backend.jar && \
             systemctl start sism-backend"

      - name: Wait for service startup
        run: sleep 15

      - name: Health check
        run: |
          for i in 1 2 3; do
            if ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "curl -sf http://localhost:8080/api/actuator/health > /dev/null"; then
              echo "✅ Backend deployed and healthy"
              exit 0
            fi
            echo "⏳ Health check retry $i/3..."
            sleep 5
          done
          echo "❌ Health check failed"
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "journalctl -u sism-backend -n 30 --no-pager"
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
