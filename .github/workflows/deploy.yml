# 后端自动部署到生产服务器
# 仓库: CDUESTC-OpenAtom-Club/sism-backend

name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAR_NAME: sism-backend-1.0.0.jar
  SERVER_USER: root
  SERVER_HOST: 175.24.139.148

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: [self-hosted, linux]
    
    steps:
      - name: Reset workspace permissions
        run: |
          echo "Resetting runner workspace..."
          WORK_DIR="${GITHUB_WORKSPACE}"
          PARENT_DIR="$(dirname "$WORK_DIR")"

          sudo mkdir -p "$WORK_DIR"
          sudo chown -R "$(whoami):$(whoami)" "$PARENT_DIR" || true
          sudo chmod -R u+rwX "$PARENT_DIR" || true

          # Remove stale checkout content so actions/checkout never trips on
          # root-owned build artifacts left behind by prior runs.
          sudo find "$WORK_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
          echo "Runner workspace reset complete"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1

      - name: Verify build toolchain
        run: |
          java -version
          mvn -version

      - name: Build with Maven
        run: mvn clean package -B -DskipTests -Dmaven.test.skip=true -Dmaven.javadoc.skip=true

      - name: Stop backend service
        run: sudo systemctl stop sism-backend || true

      - name: Deploy JAR
        run: |
          echo "[INFO] Deploying JAR to /opt/sism/backend/"
          sudo cp sism-main/target/sism-main-1.0.0.jar /opt/sism/backend/sism-backend-1.0.0.jar
          sudo chown root:sism /opt/sism/backend/sism-backend-1.0.0.jar
          sudo chmod 775 /opt/sism/backend/sism-backend-1.0.0.jar
          echo "[INFO] JAR deployed successfully"

      - name: Start backend service
        run: sudo systemctl start sism-backend

      - name: Wait for service startup
        run: |
          echo "[INFO] Waiting for Spring Boot application to start..."
          sleep 30

      - name: Health check
        run: |
          echo "[INFO] Starting health check (max 60 seconds)..."
          MAX_ATTEMPTS=12
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "[INFO] Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."

            # Check if server responds (any valid API endpoint)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/users/me 2>/dev/null)
            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo "[SUCCESS] Backend is healthy! (HTTP $HTTP_CODE)"
              exit 0
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              sleep 5
            fi
          done

          echo "[ERROR] Health check failed after $MAX_ATTEMPTS attempts"
          echo "[INFO] Service status:"
          sudo systemctl status sism-backend --no-pager | head -20
          echo ""
          echo "[INFO] Recent logs:"
          sudo journalctl -u sism-backend -n 50 --no-pager
          exit 1
