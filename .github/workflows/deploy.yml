# 后端自动部署到生产服务器
# 仓库: CDUESTC-OpenAtom-Club/sism-backend

name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAR_NAME: sism-backend-1.0.0.jar
  SERVER_USER: root
  SERVER_HOST: 175.24.139.148

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: [self-hosted, linux]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B -DskipTests -Dmaven.test.skip=true -Dmaven.javadoc.skip=true

      - name: Stop backend service
        run: sudo systemctl stop sism-backend || true

      - name: Deploy JAR
        run: |
          echo "[INFO] Deploying JAR to /opt/sism/backend/"
          sudo cp target/${{ env.JAR_NAME }} /opt/sism/backend/${{ env.JAR_NAME }}
          sudo chown root:sism /opt/sism/backend/${{ env.JAR_NAME }}
          sudo chmod 775 /opt/sism/backend/${{ env.JAR_NAME }}
          echo "[INFO] JAR deployed successfully"

      - name: Start backend service
        run: sudo systemctl start sism-backend

      - name: Wait for service startup
        run: sleep 15

      - name: Health check
        run: |
          for i in 1 2 3; do
            if curl -sf http://localhost:8080/api/actuator/health > /dev/null; then
              echo "[INFO] Backend deployed and healthy"
              exit 0
            fi
            echo "[INFO] Health check retry $i/3..."
            sleep 5
          done
          echo "[ERROR] Health check failed"
          sudo journalctl -u sism-backend -n 30 --no-pager
          exit 1
