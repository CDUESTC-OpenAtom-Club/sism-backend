# 后端自动部署到生产服务器
# 仓库: CDUESTC-OpenAtom-Club/sism-backend

name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAR_NAME: sism-backend-1.0.0.jar

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -B -DskipTests

      - name: Validate Flyway Migrations
        run: |
          echo "🔍 Validating Flyway migrations..."
          mvn flyway:validate -B
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Get JAR checksum
        id: checksum
        run: |
          LOCAL_MD5=$(md5sum target/${{ env.JAR_NAME }} | cut -d' ' -f1)
          LOCAL_SIZE=$(stat -c%s target/${{ env.JAR_NAME }})
          echo "local_md5=$LOCAL_MD5" >> $GITHUB_OUTPUT
          echo "local_size=$LOCAL_SIZE" >> $GITHUB_OUTPUT
          echo "📦 Local JAR: $LOCAL_SIZE bytes, MD5: $LOCAL_MD5"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload JAR and deploy script
        run: |
          # Upload JAR
          rsync -avz --progress -e "ssh -i ~/.ssh/deploy_key" \
            target/${{ env.JAR_NAME }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/sism/backend/
          
          # Upload deploy script to home directory
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            docs/scripts/deploy-and-restart.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/deploy-and-restart.sh
          
          # Make script executable
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "chmod +x ~/deploy-and-restart.sh"

      - name: Deploy and restart service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            # Verify file integrity
            REMOTE_MD5=$(md5sum /opt/sism/backend/${{ env.JAR_NAME }} | cut -d' ' -f1)
            REMOTE_SIZE=$(stat -c%s /opt/sism/backend/${{ env.JAR_NAME }})
            
            echo "📦 Remote JAR: $REMOTE_SIZE bytes, MD5: $REMOTE_MD5"
            echo "📦 Expected:   ${{ steps.checksum.outputs.local_size }} bytes, MD5: ${{ steps.checksum.outputs.local_md5 }}"
            
            if [ "$REMOTE_MD5" != "${{ steps.checksum.outputs.local_md5 }}" ]; then
              echo "❌ Checksum mismatch! Upload corrupted."
              exit 1
            fi
            
            echo "✅ Checksum verified"
            echo ""
            echo "🚀 Deploying and restarting service..."
            
            # Run deploy script with sudo password
            echo "${{ secrets.SERVER_SUDO_PASSWORD }}" | ~/deploy-and-restart.sh ${{ env.JAR_NAME }}
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
