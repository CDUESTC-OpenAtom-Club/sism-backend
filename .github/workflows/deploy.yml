# 后端自动部署到生产服务器
# 仓库: CDUESTC-OpenAtom-Club/sism-backend

name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAR_NAME: sism-backend-1.0.0.jar

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B -DskipTests -Dmaven.test.skip=true -Dmaven.javadoc.skip=true

      # Note: Flyway migrations are handled on the server, not in CI
      # The production database is already initialized and managed separately

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload JAR and deploy script
        run: |
          # Upload JAR
          rsync -az -e "ssh -i ~/.ssh/deploy_key" \
            target/${{ env.JAR_NAME }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/sism/backend/
          
          # Upload deploy script
          rsync -az -e "ssh -i ~/.ssh/deploy_key" \
            docs/scripts/deploy-and-restart.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/deploy-and-restart.sh
          
          # Make script executable
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "chmod +x ~/deploy-and-restart.sh"

      - name: Deploy and restart service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "🚀 Deploying and restarting service..."
            echo "${{ secrets.SERVER_SUDO_PASSWORD }}" | ~/deploy-and-restart.sh ${{ env.JAR_NAME }}
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
