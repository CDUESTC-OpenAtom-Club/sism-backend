name: Build and Push Backend Image

on:
  push:
    branches: [main, codex/docker-deploy-test]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-image-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '17'

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run backend verification
        if: github.ref_name != 'codex/docker-deploy-test'
        run: mvn -B clean verify

      - name: Build backend package for deployment branch
        if: github.ref_name == 'codex/docker-deploy-test'
        run: mvn -B -pl sism-main -am clean package -Dmaven.test.skip=true -Dmaven.javadoc.skip=true

      - name: Validate Flyway migration naming
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          migration_dir = pathlib.Path("sism-main/src/main/resources/db/migration")
          pattern = re.compile(r"^V([0-9]+(?:\.[0-9]+)?)__.+\.sql$")

          versions = {}
          errors = []

          for file in sorted(migration_dir.glob("V*__*.sql")):
            match = pattern.match(file.name)
            if not match:
              errors.append(f"Invalid migration filename: {file.name}")
              continue
            version = match.group(1)
            if version in versions:
              errors.append(f"Duplicate migration version {version}: {versions[version]} and {file.name}")
            versions[version] = file.name

          if errors:
            print("\\n".join(errors))
            sys.exit(1)

          print(f"Validated {len(versions)} Flyway migration filenames.")
          PY

  build-and-push:
    name: Build and Push
    needs: qa
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/sism-backend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:main
