# SISM Main Application Configuration
# 战略指标任务管理系统 - 主应用配置

server:
  port: 8080

spring:
  application:
    name: sism-backend
  
  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sism_db}
    username: ${DB_USERNAME:sism_user}
    password: ${DB_PASSWORD:sism_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_HIKARI_MIN_IDLE:5}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT:120000}
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME:180000}
      connection-test-query: SELECT 1
      validation-timeout: ${DB_HIKARI_VALIDATION_TIMEOUT:5000}
      leak-detection-threshold: 60000
      keepalive-time: ${DB_HIKARI_KEEPALIVE_TIME:60000}
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none  # 禁用自动更新,使用 Flyway 管理
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

# Spring Boot Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /api/v1/actuator
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.sism: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_SQL_BINDER:WARN}

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

auth:
  login:
    max-failures: ${AUTH_LOGIN_MAX_FAILURES:5}
    lock-duration-seconds: ${AUTH_LOGIN_LOCK_DURATION_SECONDS:900}

# WebSocket Configuration
websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:}

# File Upload Configuration
file:
  upload:
    path: ${FILE_UPLOAD_PATH:${user.home}/.sism/uploads}
    max-size: 31457280  # 30MB

# Export Configuration
export:
  temp-dir: ./exports
  max-records: 100000
