# ============================================
# SISM 战略指标管理系统 - Nginx 配置
# ============================================
# 部署位置: /etc/nginx/sites-available/sism
# 启用方式: ln -s /etc/nginx/sites-available/sism /etc/nginx/sites-enabled/
# ============================================

# 上游后端服务器配置
upstream sism_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name blackevil.cn;
    
    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blackevil.cn;
    
    # ============================================
    # SSL 证书配置
    # ============================================
    ssl_certificate /etc/nginx/ssl/sism.crt;
    ssl_certificate_key /etc/nginx/ssl/sism.key;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # ============================================
    # 安全响应头
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # HSTS (启用后请确保 HTTPS 配置正确)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # ============================================
    # 日志配置
    # ============================================
    access_log /var/log/nginx/sism_access.log combined;
    error_log /var/log/nginx/sism_error.log warn;
    
    # ============================================
    # 通用配置
    # ============================================
    root /var/www/sism;
    index index.html;
    
    # 客户端请求限制
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    gzip_min_length 1024;
    
    # ============================================
    # 前端静态资源
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
        
        # 缓存控制 - HTML 文件永不缓存，确保用户始终获取最新版本
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Last-Modified $date_gmt;
            if_modified_since off;
            etag off;
        }
    }
    
    # 静态资源缓存 (带 hash 的文件)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # ============================================
    # API 反向代理
    # ============================================
    location /api/ {
        proxy_pass http://sism_backend;
        proxy_http_version 1.1;
        
        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 连接设置
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # 不缓存 API 响应
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    
    # ============================================
    # 健康检查端点
    # ============================================
    location /actuator/health {
        proxy_pass http://sism_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 允许内部访问
        # allow 127.0.0.1;
        # allow 10.0.0.0/8;
        # deny all;
    }
    
    # Actuator 其他端点 (仅内部访问)
    location /actuator/ {
        proxy_pass http://sism_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 限制访问 (取消注释以启用)
        # allow 127.0.0.1;
        # allow 10.0.0.0/8;
        # deny all;
    }
    
    # ============================================
    # Swagger UI (仅开发/测试环境启用)
    # ============================================
    # location /swagger-ui/ {
    #     proxy_pass http://sism_backend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     
    #     # 限制访问
    #     allow 127.0.0.1;
    #     allow 192.168.0.0/16;
    #     deny all;
    # }
    
    # ============================================
    # 安全配置
    # ============================================
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问备份文件
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问敏感目录
    location ~* /(\.git|\.svn|\.hg|\.env|node_modules) {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ============================================
    # 错误页面
    # ============================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# ============================================
# 可选: 限流配置 (在 http 块中添加)
# ============================================
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
#
# 在 location /api/ 中添加:
# limit_req zone=api_limit burst=20 nodelay;
# limit_conn conn_limit 10;
