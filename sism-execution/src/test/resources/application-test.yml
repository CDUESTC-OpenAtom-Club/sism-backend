spring:
  datasource:
    url: jdbc:h2:mem:sism_execution_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS public\;SET SCHEMA public\;CREATE TYPE IF NOT EXISTS org_type AS ENUM ('admin','functional','academic')
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  event-store:
    persistence: in-memory

logging:
  level:
    com.sism: INFO
    org.hibernate.SQL: WARN
